name: Build All

on:
  push:

jobs:
  firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Build HelloWord-Keyboard-bootloader
        working-directory: 2.Firmware/HelloWord-Keyboard-bootloader
        run: |
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Build HelloWord-Keyboard-fw
        working-directory: 2.Firmware/HelloWord-Keyboard-fw
        run: |
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Build HelloWord-Dynamic-fw
        working-directory: 2.Firmware/HelloWord-Dynamic-fw
        run: |
          if [ -f Drivers/CMSIS/Lib/libarm_cortexM4lf_math.a ] && [ ! -f Drivers/CMSIS/Lib/arm_cortexM4lf_math.a ]; then
              cp Drivers/CMSIS/Lib/libarm_cortexM4lf_math.a Drivers/CMSIS/Lib/arm_cortexM4lf_math.a
          fi
          mkdir build && cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ..
          ninja

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware-release

          cp 2.Firmware/HelloWord-Keyboard-bootloader/build/HelloWord-Keyboard-bootloader.hex firmware-release/
          cp 2.Firmware/HelloWord-Keyboard-bootloader/build/HelloWord-Keyboard-bootloader.bin firmware-release/

          cp 2.Firmware/HelloWord-Keyboard-fw/build/HelloWord-Keyboard-fw.hex firmware-release/
          cp 2.Firmware/HelloWord-Keyboard-fw/build/HelloWord-Keyboard-fw.bin firmware-release/

          cp 2.Firmware/HelloWord-Dynamic-fw/build/HelloWord-Dynamic-fw.hex firmware-release/
          cp 2.Firmware/HelloWord-Dynamic-fw/build/HelloWord-Dynamic-fw.bin firmware-release/

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HelloWord-Firmware
          path: firmware-release/

  pc-app:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: HelloWord-Manager-Windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: HelloWord-Manager-Linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: HelloWord-Manager-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libudev-dev libhidapi-dev

      - name: Install frontend dependencies
        working-directory: 3.Software/pc-app
        run: npm install

      - name: Build Tauri app
        working-directory: 3.Software/pc-app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload PC app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            3.Software/pc-app/src-tauri/target/${{ matrix.target }}/release/bundle/
